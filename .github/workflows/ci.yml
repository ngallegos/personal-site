name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-react:
    name: Build React
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: react/app
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
          cache-dependency-path: react/app/yarn.lock

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build
        run: yarn build
        env:
          VITE_API_GATEWAY_URL: https://placeholder.example.com
          VITE_CONTENT_DOMAIN: placeholder.example.com

      # - name: Test
      #   run: yarn test --watchAll=false

  build-dotnet:
    name: Build .NET
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.x

      - name: Build
        run: dotnet build dotnet/PersonalSite.slnx

      # - name: Test
      #   run: dotnet test dotnet/PersonalSite.slnx
